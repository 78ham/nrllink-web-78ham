<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit" />
    <meta name="referrer" content="never" />
    <meta name="format-detection" content="telephone=yes" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, minimum-scale=1, user-scalable=yes, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1424" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fbff" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HAM互联" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="HAM互联" />
    <meta name="description" content="NRL无线电网络互联系统 - 业余HAM设备互联平台" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="color-scheme" content="dark light" />
    <style>
      html,
      body,
      #app {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #0b1424;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      @media (prefers-color-scheme: light) {
        html, body, #app { background: #f8fbff; }
      }
      /* Safe area insets for notched devices */
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
    </style>
    <title>%VITE_APP_TITLE%</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
